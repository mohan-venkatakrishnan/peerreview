# Security headers served by Amplify Hosting on every response (OWASP A05).
# Ships INSIDE the deploy artifact (copied into dist/) — LaunchPad pattern.
customHeaders:
  # HTML must never be cached — it points at the hashed JS bundle, so a stale
  # index.html serves an old build (e.g. a form that drops fields). Always
  # revalidate the document; the fingerprinted assets below cache forever.
  - pattern: '**/*.html'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '/'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '/assets/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '**'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - key: X-Frame-Options
        value: 'DENY'
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), payment=()'
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.execute-api.us-east-1.amazonaws.com https://*.amazoncognito.com https://formspree.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.amazoncognito.com https://accounts.google.com"
